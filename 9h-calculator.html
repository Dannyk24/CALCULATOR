<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator-box">
        <div class="js-calculation">
            <p class="js-calculation-equation"></p>
            <p class="js-calculation-result"></p>
        </div>
        <p>
            <button onclick="assignValue('1')">1</button>
            <button onclick="assignValue('2')">2</button>
            <button onclick="assignValue('3')">3</button>
            <button class="operator" onclick="assignValue('+')">+</button>
        </p>
        <p>
            <button onclick="assignValue('4')">4</button>
            <button onclick="assignValue('5')">5</button>
            <button onclick="assignValue('6')">6</button>
            <button class="operator" onclick="assignValue('-')">-</button>
        </p>
        <p>
            <button onclick="assignValue('7')">7</button>
            <button onclick="assignValue('8')">8</button>
            <button onclick="assignValue('9')">9</button>
            <button class="operator" onclick="assignValue('*')">x</button>
        </p>
        <p>
            <button onclick="resetCalculation()" style="background-color: rgb(145, 84, 15);">C</button>
            <button onclick="assignValue('0')">0</button>
            <button onclick="assignValue('.')">.</button>
            <button class="operator" onclick="assignValue('/')">/</button>
        </p>
        <div id="equal" onclick="calculationResult()">=</div>
    </div>
    <script src="script.js"> </script>
</body>

</html>
